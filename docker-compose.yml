services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tickets
      POSTGRES_USER: tickets
      POSTGRES_PASSWORD: tickets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets -d tickets"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        BUILD_ID: "20260321-1"
    ports:
      - "18000:8000"
    environment:
      DATABASE_URL: postgresql://tickets:tickets@db:5432/tickets
      SECRET_KEY: cambia-questa-chiave-segreta-in-produzione-con-stringa-lunga
      FRONTEND_URL: https://app.morpheushub.cloud
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - uploads_data:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        BUILD_ID: "20260321-1"
    ports:
      - "13000:80"
    depends_on:
      - backend
    restart: unless-stopped

  website:
    build: ./website
    ports:
      - "4000:80"
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
